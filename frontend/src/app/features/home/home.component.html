<!--
  HomeComponent — Template principal de la pantalla Home.
  Estructura semántica HTML5 para cumplir ISO 25010 (Usabilidad, Accesibilidad).

  Partículas decorativas de fondo simulan el ambiente de un estudio de artista.
-->
<div class="home-page" role="main">

  <!-- Fondo decorativo: partículas de pintura -->
  <div class="bg-particles" aria-hidden="true">
    <span class="particle particle--1">🖌️</span>
    <span class="particle particle--2">✏️</span>
    <span class="particle particle--3">🎭</span>
    <span class="particle particle--4">🖼️</span>
    <span class="particle particle--5">🎨</span>
    <span class="particle particle--6">📜</span>
  </div>

  <!-- Tarjeta principal (pergamino) -->
  <main class="home-card" aria-label="Menú principal de Impaintor">

    <!-- Logo / título del juego -->
    <div class="game-logo" aria-label="Logotipo Impaintor">
      <span class="logo-text">Im<span class="logo-accent">pain</span>tor</span>
      <span class="logo-tagline">el juego del pintor impostor</span>
    </div>

    <!-- Banner de bienvenida personalizado -->
    <app-welcome-banner />

    <!-- Menú de opciones de juego -->
    <app-game-menu (actionSelected)="onGameAction($event)" />

    <!-- Pie de página dentro de la tarjeta -->
    <app-home-footer />

  </main>

</div>
